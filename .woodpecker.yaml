when:
  - event: cron
    cron: daily-21
  # - event: push

steps:
  - name: scrape-request
    image: python:3.12
    commands:
      - pip install -q curl_cffi beautifulsoup4
      - mkdir -p logs
      - set -o pipefail; bash src/run_scrape_request.sh 2>&1 | tee logs/scrape_request.log
    depends_on: []

  - name: crawl
    image: python:3.12
    commands:
      - apt-get update -qq && apt-get install -y -qq chromium 2>/dev/null
      - pip install -q curl_cffi beautifulsoup4 DrissionPage
      - mkdir -p logs
      - cd src
      - export PYTHONPATH="$PWD"
      - set -o pipefail; python3 crawl_runner.py 2>&1 | tee ../logs/crawl_runner.log
    depends_on: []

  - name: update-feeds
    image: alpine/git
    environment:
      CODEBERG_TOKEN:
        from_secret: Push-FengWen
    commands:
      - git config user.email "ci@woodpecker"
      - git config user.name "Woodpecker CI"
      - git add feeds/
      - "git diff --cached --quiet || git commit -m 'ci: update results [SKIP CI]'"
      - git remote set-url origin https://$CI_REPO_OWNER:$CODEBERG_TOKEN@codeberg.org/$CI_REPO.git
      - git push origin HEAD:main
    depends_on:
      - scrape-request
      - crawl
