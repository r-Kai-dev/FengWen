when:
  - event: cron
    cron: daily-21
  # - event: push

steps:
  - name: scrape-request
    image: python:3.12-bookworm
    failure: ignore
    commands:
      - pip install -q curl_cffi beautifulsoup4
      - mkdir -p logs
      - bash src/run_scrape_request.sh

  - name: crawl
    image: python:3.12-bookworm
    failure: ignore
    commands:
      - apt-get update -qq && apt-get install -y -qq chromium 2>/dev/null
      - pip install -q 'curl_cffi>=0.7,<1' 'beautifulsoup4>=4.12,<5' 'DrissionPage>=4.0,<5'
      - mkdir -p logs
      - cd src
      - export PYTHONPATH="$PWD"
      - python3 crawl_runner.py

  - name: audit
    image: python:3.12
    commands:
      - python src/audit_report.py

  - name: update-feeds
    image: alpine/git
    environment:
      CODEBERG_TOKEN:
        from_secret: Push-FengWen
    commands:
      - git config user.email "ci@woodpecker"
      - git config user.name "Woodpecker CI"
      - git add feeds/
      - "git diff --cached --quiet || git commit -m 'ci: update results [SKIP CI]'"
      - git remote set-url origin https://$CI_REPO_OWNER:$CODEBERG_TOKEN@codeberg.org/$CI_REPO.git
      - git push origin HEAD:main
