when:
  - event: cron
    cron: daily-21
  - event: push

steps:
  - name: fetch-html
    image: python:3.12
    commands:
      - pip install -q curl_cffi beautifulsoup4
      - python3 src/fetch/fetch_html.py
    depends_on: []

  - name: fetch-js
    image: python:3.12
    commands:
      - apt-get update -qq && apt-get install -y -qq chromium 2>/dev/null
      - pip install -q curl_cffi beautifulsoup4 DrissionPage
      - python3 src/fetch/fetch_js.py
    depends_on: []

  - name: request-hackernews
    image: python:3.12
    commands:
      - pip install -q curl_cffi
      - python3 src/request/request_hackernews.py
    depends_on: []

  - name: request-huggingface
    image: python:3.12
    commands:
      - pip install -q curl_cffi
      - python3 src/request/request_huggingface.py
    depends_on: []

  - name: parse
    image: python:3.12
    commands:
      - pip install -q beautifulsoup4
      - bash src/parse/run.sh
    depends_on:
      - fetch-html
      - fetch-js

  - name: update-feeds
    image: alpine/git
    environment:
      CODEBERG_TOKEN:
        from_secret: Push-FengWen
    commands:
      - git config user.email "ci@woodpecker"
      - git config user.name "Woodpecker CI"
      - git add feeds/
      - "git diff --cached --quiet || git commit -m 'ci: update results [skip ci]'"
      - git remote set-url origin https://$CI_REPO_OWNER:$CODEBERG_TOKEN@codeberg.org/$CI_REPO.git
      - git push origin HEAD:main
    depends_on:
      - parse
